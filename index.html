<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Evaluation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="manifest" href="manifest.json">
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-dark text-white">
        <h2 class="mb-0 text-center">Student Evaluation</h2>
      </div>
      <div class="card-body">
        <form id="evaluationForm">
          <div class="mb-3 mt-3">
            <label for="teacher" class="form-label">Teacher:</label>
            <input type="text" class="form-control" id="teacher" placeholder="Enter teacher name" name="teacher">
          </div>
          <div class="mb-3">
            <label for="student" class="form-label">Student:</label>
            <input type="text" class="form-control" id="student" placeholder="Enter student name" name="student">
          </div>
          <div class="mb-3">
            <label for="scr" class="form-label">Score:</label>
            <input type="number" class="form-control" id="scr" placeholder="Enter student score" name="scr">
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-danger">Submit</button>
          </div>
        </form>
        <div id="feedback" class="mt-3 text-center"></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("evaluationForm").addEventListener("submit", function(event) {
      event.preventDefault();

      let teacher = document.getElementById("teacher").value;
      let student = document.getElementById("student").value;
      let score = parseInt(document.getElementById("scr").value);
      let feedback = document.getElementById("feedback");

      let result = "";
      if (score < 50) {
        result = "lawlaw";
      } else {
        result = "pass";
      }

      feedback.innerHTML = `
          <strong>Teacher:</strong> ${teacher} <br>
          <strong>Student:</strong> ${student} <br>
          <strong>Score:</strong> ${score} <br>
          <strong>Result:</strong> ${result}
      `;
    });
  </script>
</body>
</html>
